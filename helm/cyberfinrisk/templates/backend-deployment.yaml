apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cyberfinrisk.fullname" . }}-backend
  labels:
    app: cyberfinrisk
    component: backend
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: {{ .Values.service.backend.port | quote }}
    prometheus.io/path: "/metrics"
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: cyberfinrisk
      component: backend
  template:
    metadata:
      labels:
        app: cyberfinrisk
        component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.service.backend.port | quote }}
        prometheus.io/path: "/metrics"
    spec:
      volumes:
        - name: otel-config
          configMap:
            name: {{ include "cyberfinrisk.fullname" . }}-otel-config
            optional: true
      containers:
        - name: backend
          image: "{{ .Values.image.backend.repository }}:{{ .Values.image.backend.tag }}"
          imagePullPolicy: {{ .Values.image.backend.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.backend.port }}
              name: http
          env:
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "cyberfinrisk.fullname" . }}-secrets
                  key: gemini-api-key
                  optional: true
            - name: MONGODB_URI
              value: {{ .Values.mongodb.uri | quote }}
            - name: MONGODB_DATABASE
              value: {{ .Values.mongodb.database | quote }}
            - name: POSTGRES_HOST
              value: {{ .Values.postgresql.host | quote }}
            - name: POSTGRES_PORT
              value: {{ .Values.postgresql.port | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.database | quote }}
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "cyberfinrisk.fullname" . }}-secrets
                  key: postgres-user
                  optional: true
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "cyberfinrisk.fullname" . }}-secrets
                  key: postgres-password
                  optional: true
            - name: OTEL_ENABLED
              value: {{ .Values.otel.enabled | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otel.collectorEndpoint | quote }}
            - name: LOG_FORMAT
              value: "JSON"
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.backend.port }}
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.backend.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources.backend | nindent 12 }}
        {{- if .Values.otel.enabled }}
        - name: otel-agent
          image: otel/opentelemetry-collector-contrib:{{ .Values.otel.collectorVersion }}
          args: ["--config=/etc/otel/config.yaml"]
          volumeMounts:
            - mountPath: /etc/otel
              name: otel-config
          ports:
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 4318
              name: otlp-http
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
        {{- end }}
